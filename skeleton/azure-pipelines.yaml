# ============================================================
# NB Golden Path — Azure DevOps Pipeline
# Skeleton: skeleton/ci/source-repo/azure/azure-pipelines.yaml
#
# Stages:
#   1. Build & Push image to internal registry
#   2. ACS image scan & policy check (conditional)
#   3. Image signing with Cosign/RHTAS (conditional)
#   4. SBOM generation with Syft (conditional)
#   5. Publish packages to Nexus/Artifactory
#   6. Update GitOps repo to trigger ArgoCD
# ============================================================

trigger:
  branches:
    include:
      - ${{ values.defaultBranch }}

pool:
  name: ${{ values.azurePipelinePool }}

variables:
  IMAGE_REGISTRY: ${{ values.imageRegistry }}
  IMAGE_ORG: ${{ values.imageOrg }}
  IMAGE_NAME: ${{ values.imageName }}
  BASE_IMAGE_REGISTRY: ${{ values.baseImageRegistry }}
  BASE_IMAGE_ORG: ${{ values.baseImageOrg }}
  GITOPS_REPO: ${{ values.repoURL }}
  ARTIFACT_REPO_TYPE: ${{ values.artifactRepo }}
  ARTIFACT_REPO_URL: ${{ values.artifactRepoUrl }}
  ARTIFACT_REPO_ORG: ${{ values.artifactRepoOrg }}
  APP_NAME: ${{ values.name }}
  NAMESPACE: ${{ values.namespace }}
  IMAGE_TAG: $(Build.SourceVersion)
  FULL_IMAGE: $(IMAGE_REGISTRY)/$(IMAGE_ORG)/$(IMAGE_NAME):$(IMAGE_TAG)

stages:

  # ── Stage 1: Build & Push ──────────────────────────────────────────────
  - stage: Build
    displayName: Build & Push Image
    jobs:
      - job: BuildImage
        displayName: Build and push container image
        steps:

          - checkout: self
            displayName: Checkout source

          # Login to internal OpenShift registry
          - task: CmdLine@2
            displayName: Login to Internal Registry
            inputs:
              script: |
                echo "$(REGISTRY_PASSWORD)" | docker login \
                  $(IMAGE_REGISTRY) \
                  -u $(REGISTRY_USERNAME) \
                  --password-stdin
            env:
              REGISTRY_USERNAME: $(REGISTRY_USERNAME)
              REGISTRY_PASSWORD: $(REGISTRY_PASSWORD)

          # Build using approved NB base image from internal registry
          - task: CmdLine@2
            displayName: Build Container Image
            inputs:
              script: |
                docker build \
                  --build-arg BASE_IMAGE=$(BASE_IMAGE_REGISTRY)/$(BASE_IMAGE_ORG)/${{ values.language }}-base:latest \
                  --label "git-commit=$(Build.SourceVersion)" \
                  --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                  --label "app-name=$(APP_NAME)" \
                  -f docker/Dockerfile \
                  -t $(FULL_IMAGE) \
                  -t $(IMAGE_REGISTRY)/$(IMAGE_ORG)/$(IMAGE_NAME):latest \
                  .

          # Push to internal registry
          - task: CmdLine@2
            displayName: Push Image
            inputs:
              script: |
                docker push $(FULL_IMAGE)
                docker push $(IMAGE_REGISTRY)/$(IMAGE_ORG)/$(IMAGE_NAME):latest

          # Publish image ref for downstream stages
          - task: CmdLine@2
            displayName: Export image digest
            inputs:
              script: |
                IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $(FULL_IMAGE))
                echo "##vso[task.setvariable variable=IMAGE_DIGEST;isOutput=true]$IMAGE_DIGEST"
                echo "Image digest: $IMAGE_DIGEST"
            name: imageDigest

{%- if values.enable_acs_scan %}
  # ── Stage 2: ACS Image Scan ────────────────────────────────────────────
  - stage: ACSscan
    displayName: ACS Image Scan & Policy Check
    dependsOn: Build
    variables:
      IMAGE_DIGEST: $[ stageDependencies.Build.BuildImage.outputs['imageDigest.IMAGE_DIGEST'] ]
    jobs:
      - job: ACSScan
        displayName: Scan image with Red Hat ACS
        steps:
          - task: CmdLine@2
            displayName: Install roxctl
            inputs:
              script: |
                curl -fsSL -o roxctl \
                  https://mirror.openshift.com/pub/rhacs/assets/latest/bin/linux/roxctl
                chmod +x roxctl
                sudo mv roxctl /usr/local/bin/

          - task: CmdLine@2
            displayName: ACS Image Scan
            inputs:
              script: |
                roxctl image scan \
                  --endpoint $(ROX_CENTRAL_ENDPOINT) \
                  --image $(FULL_IMAGE) \
                  --output table
            env:
              ROX_API_TOKEN: $(ROX_API_TOKEN)

          - task: CmdLine@2
            displayName: ACS Policy Check
            inputs:
              script: |
                roxctl image check \
                  --endpoint $(ROX_CENTRAL_ENDPOINT) \
                  --image $(FULL_IMAGE) \
                  --output table \
                  --exit-code 1
            env:
              ROX_API_TOKEN: $(ROX_API_TOKEN)
{%- endif %}

{%- if values.enable_signing %}
  # ── Stage 3: Image Signing (RHTAS / Cosign) ────────────────────────────
  - stage: Sign
    displayName: Sign Image with RHTAS
    dependsOn:
{%- if values.enable_acs_scan %}
      - ACSscan
{%- else %}
      - Build
{%- endif %}
    variables:
      IMAGE_DIGEST: $[ stageDependencies.Build.BuildImage.outputs['imageDigest.IMAGE_DIGEST'] ]
    jobs:
      - job: SignImage
        displayName: Sign container image
        steps:
          - task: CmdLine@2
            displayName: Install Cosign
            inputs:
              script: |
                curl -fsSL -o cosign \
                  https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
                chmod +x cosign
                sudo mv cosign /usr/local/bin/

          - task: CmdLine@2
            displayName: Sign Image
            inputs:
              script: |
                echo "$(COSIGN_PASSWORD)" | cosign sign \
                  --key env://COSIGN_PRIVATE_KEY \
                  --tlog-upload=false \
                  $(IMAGE_DIGEST)
            env:
              COSIGN_PRIVATE_KEY: $(COSIGN_PRIVATE_KEY)
              COSIGN_PASSWORD: $(COSIGN_PASSWORD)

          - task: CmdLine@2
            displayName: Attach SLSA Provenance Attestation
            inputs:
              script: |
                cosign attest \
                  --key env://COSIGN_PRIVATE_KEY \
                  --type slsaprovenance \
                  --predicate <(echo '{
                    "builder": {"id": "https://dev.azure.com/${{ values.azureOrg }}/${{ values.azureProject }}"},
                    "buildType": "azure-devops-pipeline",
                    "invocation": {
                      "configSource": {
                        "uri": "$(Build.Repository.Uri)",
                        "digest": {"sha1": "$(Build.SourceVersion)"}
                      }
                    }
                  }') \
                  $(IMAGE_DIGEST)
            env:
              COSIGN_PRIVATE_KEY: $(COSIGN_PRIVATE_KEY)
              COSIGN_PASSWORD: $(COSIGN_PASSWORD)
{%- endif %}

{%- if values.enable_sbom %}
  # ── Stage 4: SBOM Generation ───────────────────────────────────────────
  - stage: SBOM
    displayName: Generate & Publish SBOM
    dependsOn:
{%- if values.enable_signing %}
      - Sign
{%- elif values.enable_acs_scan %}
      - ACSscan
{%- else %}
      - Build
{%- endif %}
    variables:
      IMAGE_DIGEST: $[ stageDependencies.Build.BuildImage.outputs['imageDigest.IMAGE_DIGEST'] ]
    jobs:
      - job: GenerateSBOM
        displayName: Generate SBOM with Syft
        steps:
          - task: CmdLine@2
            displayName: Install Syft
            inputs:
              script: |
                curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
                  | sh -s -- -b /usr/local/bin

          - task: CmdLine@2
            displayName: Generate SBOM (SPDX + CycloneDX)
            inputs:
              script: |
                syft $(FULL_IMAGE) -o spdx-json=sbom-spdx.json
                syft $(FULL_IMAGE) -o cyclonedx-json=sbom-cyclonedx.json
                echo "SBOM files generated"

          - task: CmdLine@2
            displayName: Attach SBOM to image
            inputs:
              script: |
                cosign attach sbom \
                  --sbom sbom-spdx.json \
                  --type spdx \
                  $(IMAGE_DIGEST)
            env:
              COSIGN_PRIVATE_KEY: $(COSIGN_PRIVATE_KEY)
              COSIGN_PASSWORD: $(COSIGN_PASSWORD)

          - task: PublishBuildArtifacts@1
            displayName: Publish SBOM as pipeline artifact
            inputs:
              pathToPublish: sbom-spdx.json
              artifactName: sbom
{%- endif %}

  # ── Stage 5: Publish Packages to Nexus/Artifactory ────────────────────
  - stage: PublishPackages
    displayName: Publish Packages to ${{ values.artifactRepo | capitalize }}
    dependsOn:
{%- if values.enable_sbom %}
      - SBOM
{%- elif values.enable_signing %}
      - Sign
{%- elif values.enable_acs_scan %}
      - ACSscan
{%- else %}
      - Build
{%- endif %}
    jobs:
      - job: PublishArtifacts
        displayName: Publish to ${{ values.artifactRepo | capitalize }}
        steps:
          - checkout: self

{%- if values.language == 'python' %}
          # Python — publish wheel to Nexus/Artifactory PyPI repo
          - task: CmdLine@2
            displayName: Build Python wheel
            inputs:
              script: |
                pip install build twine
                python -m build

          - task: CmdLine@2
            displayName: Publish to ${{ values.artifactRepo | capitalize }}
            inputs:
              script: |
{%- if values.artifactRepo == 'nexus' %}
                twine upload \
                  --repository-url $(ARTIFACT_REPO_URL)/repository/$(ARTIFACT_REPO_ORG)/ \
                  --username $(ARTIFACT_REPO_USER) \
                  --password $(ARTIFACT_REPO_PASSWORD) \
                  dist/*
{%- else %}
                twine upload \
                  --repository-url $(ARTIFACT_REPO_URL)/artifactory/api/pypi/$(ARTIFACT_REPO_ORG)/ \
                  --username $(ARTIFACT_REPO_USER) \
                  --password $(ARTIFACT_REPO_PASSWORD) \
                  dist/*
{%- endif %}
            env:
              ARTIFACT_REPO_PASSWORD: $(ARTIFACT_REPO_PASSWORD)

{%- elif values.language == 'java-quarkus' or values.language == 'java-springboot' %}
          # Java — publish JAR to Nexus/Artifactory Maven repo
          - task: CmdLine@2
            displayName: Maven deploy to ${{ values.artifactRepo | capitalize }}
            inputs:
              script: |
                mvn deploy \
                  -DskipTests \
                  -DaltDeploymentRepository=nb-repo::default::$(ARTIFACT_REPO_URL)/repository/$(ARTIFACT_REPO_ORG)/ \
                  --settings .mvn/settings.xml
            env:
              ARTIFACT_REPO_USER: $(ARTIFACT_REPO_USER)
              ARTIFACT_REPO_PASSWORD: $(ARTIFACT_REPO_PASSWORD)

{%- elif values.language == 'nodejs' %}
          # Node.js — publish package to Nexus/Artifactory npm repo
          - task: CmdLine@2
            displayName: Publish npm package
            inputs:
              script: |
                npm config set registry $(ARTIFACT_REPO_URL)/repository/$(ARTIFACT_REPO_ORG)/
                npm config set _auth $(echo -n "$(ARTIFACT_REPO_USER):$(ARTIFACT_REPO_PASSWORD)" | base64)
                npm publish
            env:
              ARTIFACT_REPO_PASSWORD: $(ARTIFACT_REPO_PASSWORD)

{%- elif values.language == 'dotnet' %}
          # .NET — publish NuGet package
          - task: CmdLine@2
            displayName: Pack and publish NuGet
            inputs:
              script: |
                dotnet pack --configuration Release
                dotnet nuget push **/*.nupkg \
                  --source $(ARTIFACT_REPO_URL)/repository/$(ARTIFACT_REPO_ORG)/ \
                  --api-key $(ARTIFACT_REPO_PASSWORD)
            env:
              ARTIFACT_REPO_PASSWORD: $(ARTIFACT_REPO_PASSWORD)

{%- elif values.language == 'go' %}
          # Go — publish module proxy / binary artifact
          - task: CmdLine@2
            displayName: Build Go binary and publish
            inputs:
              script: |
                go build -o $(APP_NAME) ./...
                curl -u $(ARTIFACT_REPO_USER):$(ARTIFACT_REPO_PASSWORD) \
                  --upload-file $(APP_NAME) \
                  $(ARTIFACT_REPO_URL)/repository/$(ARTIFACT_REPO_ORG)/$(APP_NAME)/$(Build.SourceVersion)/$(APP_NAME)
            env:
              ARTIFACT_REPO_PASSWORD: $(ARTIFACT_REPO_PASSWORD)
{%- endif %}

  # ── Stage 6: Update GitOps Repo ───────────────────────────────────────
  - stage: UpdateGitOps
    displayName: Update GitOps Repository
    dependsOn: PublishPackages
    variables:
      IMAGE_DIGEST: $[ stageDependencies.Build.BuildImage.outputs['imageDigest.IMAGE_DIGEST'] ]
    jobs:
      - job: GitOpsUpdate
        displayName: Update image tag in GitOps repo
        steps:
          - task: CmdLine@2
            displayName: Configure Git
            inputs:
              script: |
                git config --global user.email "azure-pipeline@nb.com"
                git config --global user.name "NB Azure Pipeline"

          - task: CmdLine@2
            displayName: Clone GitOps repo and update image
            inputs:
              script: |
                git clone https://$(GITOPS_TOKEN)@github.com/${{ values.gitRepoOwner }}/${{ values.gitRepoName }}-gitops.git gitops
                cd gitops
                # Update image tag in dev overlay
                sed -i "s|$(IMAGE_REGISTRY)/$(IMAGE_ORG)/$(IMAGE_NAME):.*|$(IMAGE_REGISTRY)/$(IMAGE_ORG)/$(IMAGE_NAME):$(IMAGE_TAG)|g" \
                  components/$(APP_NAME)/overlays/development/deployment-patch.yaml
                git add -A
                git commit -m "chore: update $(APP_NAME) image to $(IMAGE_TAG) [skip ci]"
                git push
            env:
              GITOPS_TOKEN: $(GITOPS_TOKEN)
