# ──────────────────────────────────────────────
# ${{ values.component_id }} — Helm Values
# Generated by NB Golden Path Template
# ──────────────────────────────────────────────

replicaCount: 2

image:
  repository: registry.apps.cluster-cnhmj.dynamic.redhatworkshops.io/${{ values.system }}/${{ values.component_id }}
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: nb-registry-pull-secret

service:
  type: ClusterIP
  port: 8080

route:
  enabled: true
  host: ${{ values.component_id }}.apps.nb.internal
  tls:
    termination: edge

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilization: 80

# ── Health Checks ──
probes:
  liveness:
    path: /health/live
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    path: /health/ready
    initialDelaySeconds: 15
    periodSeconds: 5

# ── Security ──
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# ── Network Policy (ACS-visible) ──
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: openshift-ingress
      ports:
        - port: 8080
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
        - port: 5432
          protocol: TCP
        - port: 9092
          protocol: TCP

# ── Observability ──
monitoring:
  enabled: true
  serviceMonitor:
    interval: 30s
    path: /metrics

# ── Kafka (if enabled) ──
kafka:
  enabled: ${{ values.include_kafka }}
  bootstrapServers: nb-kafka-bootstrap.kafka.svc:9092

# ── Database (if enabled) ──
database:
  enabled: ${{ values.include_db }}
  type: ${{ values.db_type }}
