# ============================================================
# NB Golden Path — GitHub Actions Pipeline
# Skeleton: skeleton/ci/source-repo/githubactions/.github/workflows/pipeline.yaml
#
# Stages:
#   1. Build & Push image to internal registry
#   2. ACS image scan & policy check (conditional)
#   3. Image signing with Cosign/RHTAS (conditional)
#   4. SBOM generation with Syft (conditional)
#   5. Publish packages to Nexus/Artifactory
#   6. Update GitOps repo to trigger ArgoCD
# ============================================================

name: NB CI Pipeline — ${{ values.name }}

on:
  push:
    branches:
      - ${{ values.defaultBranch }}
  pull_request:
    branches:
      - ${{ values.defaultBranch }}

env:
  IMAGE_REGISTRY: ${{ values.imageRegistry }}
  IMAGE_ORG: ${{ values.imageOrg }}
  IMAGE_NAME: ${{ values.imageName }}
  BASE_IMAGE_REGISTRY: ${{ values.baseImageRegistry }}
  BASE_IMAGE_ORG: ${{ values.baseImageOrg }}
  ARTIFACT_REPO_TYPE: ${{ values.artifactRepo }}
  ARTIFACT_REPO_URL: ${{ values.artifactRepoUrl }}
  ARTIFACT_REPO_ORG: ${{ values.artifactRepoOrg }}
  APP_NAME: ${{ values.name }}
  NAMESPACE: ${{ values.namespace }}
  IMAGE_TAG: ${{ '${{ github.sha }}' }}
  FULL_IMAGE: ${{ values.imageRegistry }}/${{ values.imageOrg }}/${{ values.imageName }}:${{ '${{ github.sha }}' }}

jobs:

  # ── Job 1: Build & Push ───────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ '${{ steps.push.outputs.digest }}' }}
      full-image: ${{ '${{ env.FULL_IMAGE }}' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to Internal Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ values.imageRegistry }}
          username: ${{ '${{ secrets.REGISTRY_USERNAME }}' }}
          password: ${{ '${{ secrets.REGISTRY_PASSWORD }}' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ values.imageRegistry }}/${{ values.imageOrg }}/${{ values.imageName }}:${{ '${{ github.sha }}' }}
            ${{ values.imageRegistry }}/${{ values.imageOrg }}/${{ values.imageName }}:latest
          build-args: |
            BASE_IMAGE=${{ values.baseImageRegistry }}/${{ values.baseImageOrg }}/${{ values.language }}-base:latest
          labels: |
            git-commit=${{ '${{ github.sha }}' }}
            app-name=${{ values.name }}
            build-date=${{ '${{ github.event.head_commit.timestamp }}' }}

{%- if values.enable_acs_scan %}
  # ── Job 2: ACS Image Scan ─────────────────────────────────────────────
  acs-scan:
    name: ACS Image Scan & Policy Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Install roxctl
        run: |
          curl -fsSL -o roxctl \
            https://mirror.openshift.com/pub/rhacs/assets/latest/bin/linux/roxctl
          chmod +x roxctl
          sudo mv roxctl /usr/local/bin/

      - name: ACS Image Scan
        env:
          ROX_API_TOKEN: ${{ '${{ secrets.ROX_API_TOKEN }}' }}
          ROX_CENTRAL_ENDPOINT: ${{ '${{ secrets.ROX_CENTRAL_ENDPOINT }}' }}
        run: |
          roxctl image scan \
            --endpoint $ROX_CENTRAL_ENDPOINT \
            --image ${{ '${{ needs.build.outputs.full-image }}' }} \
            --output table

      - name: ACS Policy Check
        env:
          ROX_API_TOKEN: ${{ '${{ secrets.ROX_API_TOKEN }}' }}
          ROX_CENTRAL_ENDPOINT: ${{ '${{ secrets.ROX_CENTRAL_ENDPOINT }}' }}
        run: |
          roxctl image check \
            --endpoint $ROX_CENTRAL_ENDPOINT \
            --image ${{ '${{ needs.build.outputs.full-image }}' }} \
            --output table \
            --exit-code 1
{%- endif %}

{%- if values.enable_signing %}
  # ── Job 3: Image Signing (RHTAS / Cosign) ─────────────────────────────
  sign:
    name: Sign Image with RHTAS
    runs-on: ubuntu-latest
    needs:
{%- if values.enable_acs_scan %}
      - acs-scan
{%- else %}
      - build
{%- endif %}

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Image
        env:
          COSIGN_PRIVATE_KEY: ${{ '${{ secrets.COSIGN_PRIVATE_KEY }}' }}
          COSIGN_PASSWORD: ${{ '${{ secrets.COSIGN_PASSWORD }}' }}
        run: |
          cosign sign \
            --key env://COSIGN_PRIVATE_KEY \
            --tlog-upload=false \
            ${{ '${{ needs.build.outputs.image-digest }}' }}

      - name: Attach SLSA Provenance Attestation
        env:
          COSIGN_PRIVATE_KEY: ${{ '${{ secrets.COSIGN_PRIVATE_KEY }}' }}
          COSIGN_PASSWORD: ${{ '${{ secrets.COSIGN_PASSWORD }}' }}
        run: |
          cosign attest \
            --key env://COSIGN_PRIVATE_KEY \
            --type slsaprovenance \
            --predicate <(echo '{
              "builder": {"id": "https://github.com/${{ values.gitRepoOwner }}/${{ values.gitRepoName }}/actions"},
              "buildType": "github-actions-workflow",
              "invocation": {
                "configSource": {
                  "uri": "https://github.com/${{ values.gitRepoOwner }}/${{ values.gitRepoName }}",
                  "digest": {"sha1": "${{ '${{ github.sha }}' }}"}
                }
              }
            }') \
            ${{ '${{ needs.build.outputs.image-digest }}' }}
{%- endif %}

{%- if values.enable_sbom %}
  # ── Job 4: SBOM Generation ────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs:
{%- if values.enable_signing %}
      - sign
{%- elif values.enable_acs_scan %}
      - acs-scan
{%- else %}
      - build
{%- endif %}

    steps:
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX + CycloneDX)
        run: |
          syft ${{ '${{ needs.build.outputs.full-image }}' }} -o spdx-json=sbom-spdx.json
          syft ${{ '${{ needs.build.outputs.full-image }}' }} -o cyclonedx-json=sbom-cyclonedx.json

      - name: Attach SBOM to image
        env:
          COSIGN_PRIVATE_KEY: ${{ '${{ secrets.COSIGN_PRIVATE_KEY }}' }}
          COSIGN_PASSWORD: ${{ '${{ secrets.COSIGN_PASSWORD }}' }}
        run: |
          cosign attach sbom \
            --sbom sbom-spdx.json \
            --type spdx \
            ${{ '${{ needs.build.outputs.image-digest }}' }}

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
{%- endif %}

  # ── Job 5: Publish Packages to Nexus/Artifactory ─────────────────────
  publish-packages:
    name: Publish Packages to ${{ values.artifactRepo | capitalize }}
    runs-on: ubuntu-latest
    needs:
{%- if values.enable_sbom %}
      - sbom
{%- elif values.enable_signing %}
      - sign
{%- elif values.enable_acs_scan %}
      - acs-scan
{%- else %}
      - build
{%- endif %}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

{%- if values.language == 'python' %}
      - name: Set up Python ${{ values.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: "${{ values.python_version }}"

      - name: Build Python wheel
        run: |
          pip install build twine
          python -m build

      - name: Publish to ${{ values.artifactRepo | capitalize }}
        env:
          ARTIFACT_REPO_PASSWORD: ${{ '${{ secrets.ARTIFACT_REPO_PASSWORD }}' }}
        run: |
{%- if values.artifactRepo == 'nexus' %}
          twine upload \
            --repository-url ${{ values.artifactRepoUrl }}/repository/${{ values.artifactRepoOrg }}/ \
            --username ${{ values.artifactRepoUser }} \
            --password $ARTIFACT_REPO_PASSWORD \
            dist/*
{%- else %}
          twine upload \
            --repository-url ${{ values.artifactRepoUrl }}/artifactory/api/pypi/${{ values.artifactRepoOrg }}/ \
            --username ${{ values.artifactRepoUser }} \
            --password $ARTIFACT_REPO_PASSWORD \
            dist/*
{%- endif %}

{%- elif values.language == 'java-quarkus' or values.language == 'java-springboot' %}
      - name: Set up Java ${{ values.java_version }}
        uses: actions/setup-java@v4
        with:
          java-version: "${{ values.java_version }}"
          distribution: temurin

      - name: Maven deploy to ${{ values.artifactRepo | capitalize }}
        env:
          ARTIFACT_REPO_USER: ${{ values.artifactRepoUser }}
          ARTIFACT_REPO_PASSWORD: ${{ '${{ secrets.ARTIFACT_REPO_PASSWORD }}' }}
        run: |
          mvn deploy \
            -DskipTests \
            -DaltDeploymentRepository=nb-repo::default::${{ values.artifactRepoUrl }}/repository/${{ values.artifactRepoOrg }}/ \
            --settings .mvn/settings.xml

{%- elif values.language == 'nodejs' %}
      - name: Set up Node.js ${{ values.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: "${{ values.node_version }}"

      - name: Publish npm package
        env:
          ARTIFACT_REPO_PASSWORD: ${{ '${{ secrets.ARTIFACT_REPO_PASSWORD }}' }}
        run: |
          npm config set registry ${{ values.artifactRepoUrl }}/repository/${{ values.artifactRepoOrg }}/
          npm config set _auth $(echo -n "${{ values.artifactRepoUser }}:$ARTIFACT_REPO_PASSWORD" | base64)
          npm publish

{%- elif values.language == 'dotnet' %}
      - name: Set up .NET ${{ values.dotnet_version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "${{ values.dotnet_version }}"

      - name: Pack and publish NuGet
        env:
          ARTIFACT_REPO_PASSWORD: ${{ '${{ secrets.ARTIFACT_REPO_PASSWORD }}' }}
        run: |
          dotnet pack --configuration Release
          dotnet nuget push **/*.nupkg \
            --source ${{ values.artifactRepoUrl }}/repository/${{ values.artifactRepoOrg }}/ \
            --api-key $ARTIFACT_REPO_PASSWORD

{%- elif values.language == 'go' %}
      - name: Set up Go ${{ values.go_version }}
        uses: actions/setup-go@v5
        with:
          go-version: "${{ values.go_version }}"

      - name: Build and publish Go binary
        env:
          ARTIFACT_REPO_PASSWORD: ${{ '${{ secrets.ARTIFACT_REPO_PASSWORD }}' }}
        run: |
          go build -o ${{ values.name }} ./...
          curl -u ${{ values.artifactRepoUser }}:$ARTIFACT_REPO_PASSWORD \
            --upload-file ${{ values.name }} \
            ${{ values.artifactRepoUrl }}/repository/${{ values.artifactRepoOrg }}/${{ values.name }}/${{ '${{ github.sha }}' }}/${{ values.name }}
{%- endif %}

  # ── Job 6: Update GitOps Repo ─────────────────────────────────────────
  update-gitops:
    name: Update GitOps Repository
    runs-on: ubuntu-latest
    needs: publish-packages
    if: github.ref == 'refs/heads/${{ values.defaultBranch }}'

    steps:
      - name: Configure Git
        run: |
          git config --global user.email "github-actions@nb.com"
          git config --global user.name "NB GitHub Actions"

      - name: Clone GitOps repo and update image tag
        env:
          GITOPS_TOKEN: ${{ '${{ secrets.GITOPS_TOKEN }}' }}
        run: |
          git clone https://$GITOPS_TOKEN@github.com/${{ values.gitRepoOwner }}/${{ values.gitRepoName }}-gitops.git gitops
          cd gitops
          sed -i "s|${{ values.imageRegistry }}/${{ values.imageOrg }}/${{ values.imageName }}:.*|${{ values.imageRegistry }}/${{ values.imageOrg }}/${{ values.imageName }}:${{ '${{ github.sha }}' }}|g" \
            components/${{ values.name }}/overlays/development/deployment-patch.yaml
          git add -A
          git commit -m "chore: update ${{ values.name }} image to ${{ '${{ github.sha }}' }} [skip ci]"
          git push
