app:
  baseUrl: ${BACKEND_URL}
  title: Red Hat Developer Hub
argocd:
  appLocatorMethods:
  - instances:
    - name: default
      token: ${ARGOCD__API_TOKEN}
      url: ${ARGOCD__URL}
    type: config
  password: ${ARGOCD__PASSWORD}
  username: ${ARGOCD__USER}
  waitCycles: 25
auth:
  environment: production
  providers:
    oidc:
      production:
        clientId: ${AUTH_OIDC_CLIENT_ID}
        clientSecret: ${AUTH_OIDC_CLIENT_SECRET}
        metadataUrl: ${AUTH_OIDC_METADATA_URL}
        prompt: auto
        signIn:
          resolvers:
          - resolver: preferredUsernameMatchingUserEntityName
  session:
    secret:
      $env: BACKEND_SECRET
backend:
  auth:
    keys:
    - secret: ${BACKEND_SECRET}
  baseUrl: ${BACKEND_URL}
  cors:
    origin: ${BACKEND_URL}
  reading:
    allow:
      - host: 'gitlab-gitlab.apps.cluster-cnhmj.dynamic.redhatworkshops.io'
      - host: 'github.com'
catalog:
  locations:
  - target: ${DEVELOPER_HUB__CATALOG__URL}
    type: url
  - target: https://gitlab-gitlab.apps.cluster-cnhmj.dynamic.redhatworkshops.io/rhdh/tssc-developer-hub-configuration/-/blob/main/all-locations.yaml
    type: url
  - target: https://github.com/sansow/nb-golden-path-base/blob/main/nb-python-coe-template.yaml
    type: url
    rules:
      - allow: [Template]
  providers:
    keycloakOrg:
      default:
        baseUrl: ${KEYCLOAK_BASE_URL}
        clientId: ${KEYCLOAK_CLIENT_ID}
        clientSecret: ${KEYCLOAK_CLIENT_SECRET}
        loginRealm: ${KEYCLOAK_LOGIN_REALM}
        realm: ${KEYCLOAK_REALM}
        schedule:
          frequency:
            minutes: 2
          initialDelay:
            seconds: 15
          timeout:
            minutes: 2
  rules:
  - allow:
    - Component
    - System
    - Group
    - User
    - Resource
    - Location
    - Template
    - API
integrations:
  gitlab:
  - apiBaseUrl: https://${GITLAB__HOST}/api/v4
    host: ${GITLAB__HOST}
    token: ${GITLAB__TOKEN}
  github:
  - host: github.com
    token: ${GITHUB_TOKEN}
jenkins:
  instances:
  - apiKey: ${JENKINS__TOKEN}
    baseUrl: ${JENKINS__BASEURL}
    name: default
    username: ${JENKINS__USERNAME}
permission:
  enabled: false
proxy:
  endpoints:
    /quay/api:
      changeOrigin: true
      headers:
        Authorization: Bearer ${QUAY__API_TOKEN}
        X-Requested-With: XMLHttpRequest
      secure: true
      target: ${QUAY__URL}
    /acs:
      credentials: dangerously-allow-unauthenticated
      target: ${ACS_API_URL}
      headers:
        authorization: "Bearer ${ACS_API_KEY}"
quay:
  uiUrl: ${QUAY__URL}
acs:
  acsUrl: ${ACS_API_URL}
signInPage: oidc
techdocs:
  builder: local
  generator:
    runIn: local
  publisher:
    type: local
