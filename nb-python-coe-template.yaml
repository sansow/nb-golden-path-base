apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nb-golden-path-python-coe-v2
  title: Python - NB Trusted Application Pipeline (v2)
  description: >
    Python microservice with Red Hat Trusted Software Supply Chain (TSSC).
    Covers building, CVE scanning (ACS), image signing (RHTAS), SBOM, SLSA provenance,
    attestations, Network Observability, and GitOps-based continuous deployment via ArgoCD.
    Supports Tekton (SLSA 3), Azure DevOps, and GitHub Actions CI providers.
  tags:
    - python
    - pip
    - flask
    - sscs
    - sbom
    - acs
    - network-observability
    - golden-path
    - nb-coe
    - coder
spec:
  owner: group:default/tssc
  type: service

  parameters:
    - title: Application Information
      required:
        - name
        - owner
        - description
      properties:
        name:
          title: Name
          type: string
          description: Unique name of the component (RFC 1123 DNS label)
          ui:autofocus: true
          ui:field: EntityNamePicker
          maxLength: 63
          pattern: '^[a-z]([-a-z0-9]*[a-z0-9])?$'
          ui:help: "Must start with lowercase letter, can contain lowercase letters, digits, hyphens. Example: nb-risk-service"
        description:
          title: Description
          type: string
          description: Short description of the service
          default: A Python microservice on the NB platform
        owner:
          title: Owner
          type: string
          description: Team or individual owning this component
          default: group:default/tssc
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]
        system:
          title: System
          type: string
          description: The system this component belongs to
          default: operations
          enum:
            - operations
            - risk
            - trading
            - compliance
            - data-platform

    - title: Source Repository
      required:
        - repoOwner
        - repoName
        - branch
      properties:
        repoOwner:
          title: GitHub Organization / Owner
          type: string
          default: sansow
          ui:help: "GitHub org or user that will own the repository"
        repoName:
          title: Repository Name
          type: string
          ui:help: "Name of the source repo to create (e.g. nb-risk-service)"
        branch:
          title: Default Branch
          type: string
          default: main

    - title: CI Provider
      required:
        - ciType
      properties:
        ciType:
          title: CI Provider
          type: string
          default: tekton
          enum:
            - tekton
            - githubactions
            - azure
          enumNames:
            - Tekton (SLSA 3)
            - GitHub Actions (SLSA 2)
            - Azure DevOps Pipelines (SLSA 2)
          ui:widget: radio
      dependencies:
        ciType:
          oneOf:
            - properties:
                ciType:
                  const: tekton
            - properties:
                ciType:
                  const: githubactions
            - required:
                - azureProject
                - azureOrg
              properties:
                ciType:
                  const: azure
                azureOrg:
                  title: Azure DevOps Organization
                  type: string
                  ui:help: "The Azure DevOps organization name (e.g. neuberger-berman)"
                azureProject:
                  title: Azure DevOps Project
                  type: string
                  ui:help: "The project to run the pipelines under"

    - title: Image Registry
      required:
        - imageRegistry
        - imageOrg
        - imageName
      properties:
        imageRegistry:
          title: Image Registry Host
          type: string
          default: quay.io
          ui:help: "On-prem example: quay-tv2pb.apps.cluster-tv2pb.sandbox.opentlc.com"
        imageOrg:
          title: Image Organization
          type: string
          default: tssc
          ui:help: "Quay organization or project"
        imageName:
          title: Image Name
          type: string
          ui:help: "Usually same as the component name"

    - title: Deployment Configuration
      required:
        - namespace
        - target_namespace
      properties:
        namespace:
          title: Deployment Namespace Prefix
          type: string
          default: tssc-app
          ui:help: "Creates <namespace>-development, <namespace>-stage, <namespace>-prod"
        target_namespace:
          title: Primary Dev Namespace
          type: string
          default: nbdev
          ui:help: "Namespace where dev workloads run (e.g. nbdev)"
        deploy_environments:
          title: Deploy Environments
          type: array
          items:
            type: string
            enum:
              - dev
              - staging
              - prod
          default:
            - dev
            - staging
          uniqueItems: true
          ui:widget: checkboxes

    - title: Coder Workspace
      properties:
        coder_template:
          title: Coder Workspace Template
          type: string
          default: nb-openshift-pod
          enum:
            - nb-openshift-pod
            - nb-openshift-pod-gpu
            - nb-openshift-pod-large
          enumNames:
            - Standard (4 CPU / 8GB)
            - GPU-enabled
            - Large (8 CPU / 16GB)
        workspace_cpu:
          title: CPU (cores)
          type: string
          default: "4"
          enum: ["2", "4", "8"]
        workspace_memory:
          title: Memory (GB)
          type: string
          default: "8"
          enum: ["4", "8", "16"]
        workspace_disk:
          title: Disk (GB)
          type: string
          default: "20"
          enum: ["10", "20", "50"]

    - title: Platform Features
      properties:
        enable_acs_scan:
          title: Enable ACS Image Scan & Policy Check
          type: boolean
          default: true
          ui:widget: radio
        enable_network_observability:
          title: Enable Network Observability
          type: boolean
          default: true
          ui:widget: radio
        enable_network_policy:
          title: Deploy Network Policies
          type: boolean
          default: true
          ui:widget: radio
        repoVerifyCommits:
          title: Verify Git Commits (RHTAS)
          type: string
          description: Verify commits using Red Hat Trusted Artifact Signer
          default: disabled
          enum:
            - enabled
            - disabled

  steps:

    # ── 0. Fetch dynamic cluster/provisioning data ──────────────────────────
    - id: fetch-provision-data
      name: Fetch Provisioning Data
      action: catalog:fetch
      input:
        entityRef: component:default/provisioning-data

    # ── 1. Fetch GitOps skeleton ────────────────────────────────────────────
    - id: fetch-gitops-skeleton
      name: Fetch GitOps Skeleton
      action: fetch:template
      input:
        url: ../../skeleton/gitops-template
        targetPath: gitops
        values:
          name: ${{ parameters.name }}
          appName: ${{ parameters.name }}-gitops
          description: GitOps manifests for ${{ parameters.name }}
          namespace: ${{ parameters.namespace }}
          rhtapNamespace: tssc
          defaultDeployNamespace: ${{ parameters.target_namespace }}
          repoURL: https://github.com/${{ parameters.repoOwner }}/${{ parameters.repoName }}-gitops
          srcRepoURL: https://github.com/${{ parameters.repoOwner }}/${{ parameters.repoName }}
          argoComponent: ./components/${{ parameters.name }}/overlays/development
          argoComponentOverlays: ./components/${{ parameters.name }}/overlays
          owner: ${{ parameters.owner }}
          image: quay.io/redhat-appstudio/rhtap-task-runner:latest
          srcImage: ${{ parameters.imageRegistry }}/${{ parameters.imageOrg }}/${{ parameters.imageName }}
          port: 8081
          argoNS: tssc-gitops
          argoProject: default
          ciType: ${{ parameters.ciType }}
          gitRepoOwner: ${{ parameters.repoOwner }}
          gitRepoName: ${{ parameters.repoName }}-gitops
          gitSecret: gitops-auth-secret
          gitSecretKey: password
          webhookSecret: pipelines-secret
          webhookSecretKey: webhook.secret
          defaultBranch: ${{ parameters.branch }}
          verifyCommits: ${{ parameters.repoVerifyCommits }}
          isTekton: ${{ parameters.ciType === 'tekton' }}
          isJenkins: false
          isGithubActions: ${{ parameters.ciType === 'githubactions' }}
          isAzure: ${{ parameters.ciType === 'azure' }}
          azureProject: ${{ parameters.azureProject if parameters.ciType === 'azure' else '' }}
          azureOrg: ${{ parameters.azureOrg if parameters.ciType === 'azure' else '' }}
          hostType: GitHub
          secretRef: false

    # ── 2. Fetch GitOps CI skeleton ─────────────────────────────────────────
    - id: fetch-gitops-ci-skeleton
      name: Fetch GitOps CI Skeleton
      action: fetch:template
      input:
        url: ../../skeleton/ci/gitops-template/${{ parameters.ciType }}
        copyWithoutRender:
          - .github/workflows/*
        targetPath: gitops
        values:
          name: ${{ parameters.name }}
          appName: ${{ parameters.name }}-gitops
          namespace: ${{ parameters.namespace }}
          repoURL: https://github.com/${{ parameters.repoOwner }}/${{ parameters.repoName }}-gitops
          srcRepoURL: https://github.com/${{ parameters.repoOwner }}/${{ parameters.repoName }}
          owner: ${{ parameters.owner }}
          srcImage: ${{ parameters.imageRegistry }}/${{ parameters.imageOrg }}/${{ parameters.imageName }}
          port: 8081
          argoNS: tssc-gitops
          argoProject: default
          gitRepoOwner: ${{ parameters.repoOwner }}
          gitRepoName: ${{ parameters.repoName }}-gitops
          gitSecret: gitops-auth-secret
          webhookSecret: pipelines-secret
          webhookSecretKey: webhook.secret
          defaultBranch: ${{ parameters.branch }}
          isTekton: ${{ parameters.ciType === 'tekton' }}
          isGithubActions: ${{ parameters.ciType === 'githubactions' }}
          isAzure: ${{ parameters.ciType === 'azure' }}
          azureProject: ${{ parameters.azureProject if parameters.ciType === 'azure' else '' }}
          azureOrg: ${{ parameters.azureOrg if parameters.ciType === 'azure' else '' }}
          hostType: GitHub
          secretRef: false

    # ── 3. Rename component directory ──────────────────────────────────────
    - id: renameComponentDir
      name: Rename Component Directory
      action: fs:rename
      input:
        files:
          - from: gitops/components/http
            to: gitops/components/${{ parameters.name }}
            overwrite: true

    # ── 4. Publish GitOps repo to GitHub ───────────────────────────────────
    - id: publish-github-gitops
      name: Publish GitOps Repository to GitHub
      action: publish:github
      input:
        sourcePath: gitops
        description: GitOps repository for ${{ parameters.name }}
        repoUrl: github.com?owner=${{ parameters.repoOwner }}&repo=${{ parameters.repoName }}-gitops
        defaultBranch: ${{ parameters.branch }}
        protectDefaultBranch: false
        repoVisibility: public

    # ── 5. Wait for GitOps repo ────────────────────────────────────────────
    - id: wait-for-gitops-repo
      name: Waiting for GitOps Repository
      action: debug:wait
      input:
        seconds: 3

    # ── 6. Create ArgoCD resources ─────────────────────────────────────────
    - id: create-argocd-resources
      name: Create ArgoCD Resources
      action: argocd:create-resources
      input:
        appName: ${{ parameters.name }}-app-of-apps
        argoInstance: default
        namespace: tssc-gitops
        repoUrl: https://github.com/${{ parameters.repoOwner }}/${{ parameters.repoName }}-gitops.git
        path: ./app-of-apps

    # ── 7. Wait for ArgoCD sync ────────────────────────────────────────────
    - id: wait-for-sync
      name: Waiting for ArgoCD Sync
      action: debug:wait
      if: ${{ parameters.ciType === 'tekton' }}
      input:
        seconds: 15

    # ── 8. Fetch Python source skeleton ────────────────────────────────────
    - id: fetch-base
      name: Fetch Python Source
      action: fetch:template
      input:
        targetPath: source
        url: ./content
        values:
          name: ${{ parameters.name }}
          namespace: ${{ parameters.namespace }}
          repoURL: https://github.com/${{ parameters.repoOwner }}/${{ parameters.repoName }}-gitops
          srcRepoURL: https://github.com/${{ parameters.repoOwner }}/${{ parameters.repoName }}

    # ── 9. Fetch source repo skeleton ──────────────────────────────────────
    - id: fetch-source-skeleton
      name: Fetch Source Skeleton
      action: fetch:template
      input:
        targetPath: source
        url: ../../skeleton/source-repo
        values:
          name: ${{ parameters.name }}
          namespace: ${{ parameters.namespace }}
          description: ${{ parameters.description }}
          dockerfile: docker/Dockerfile
          buildContext: .
          gitopsSecretName: gitops-auth-secret
          image: ${{ parameters.imageRegistry }}/${{ parameters.imageOrg }}/${{ parameters.imageName }}
          imageName: ${{ parameters.imageName }}
          tags: '["python", "pip", "flask", "sscs", "sbom", "acs", "nb-coe"]'
          repoURL: https://github.com/${{ parameters.repoOwner }}/${{ parameters.repoName }}-gitops
          hostType: GitHub
          ciType: ${{ parameters.ciType }}
          gitRepoOwner: ${{ parameters.repoOwner }}
          gitRepoName: ${{ parameters.repoName }}
          azureProject: ${{ parameters.azureProject if parameters.ciType === 'azure' else '' }}
          azureOrg: ${{ parameters.azureOrg if parameters.ciType === 'azure' else '' }}
          owner: ${{ parameters.owner }}
          repoSlug: ${{ parameters.imageOrg }}/${{ parameters.imageName }}
          defaultBranch: ${{ parameters.branch }}
          isTekton: ${{ parameters.ciType === 'tekton' }}
          isJenkins: false
          isGithubActions: ${{ parameters.ciType === 'githubactions' }}
          isAzure: ${{ parameters.ciType === 'azure' }}
          # NB-specific
          enable_acs_scan: ${{ parameters.enable_acs_scan }}
          enable_network_observability: ${{ parameters.enable_network_observability }}
          enable_network_policy: ${{ parameters.enable_network_policy }}
          target_namespace: ${{ parameters.target_namespace }}
          system: ${{ parameters.system }}
          coder_template: ${{ parameters.coder_template }}
          workspace_cpu: ${{ parameters.workspace_cpu }}
          workspace_memory: ${{ parameters.workspace_memory }}
          workspace_disk: ${{ parameters.workspace_disk }}

    # ── 10. Fetch CI skeleton ──────────────────────────────────────────────
    - id: fetch-source-ci-skeleton
      name: Fetch Source CI Skeleton
      action: fetch:template
      input:
        targetPath: source
        url: ../../skeleton/ci/source-repo/${{ parameters.ciType }}
        copyWithoutRender:
          - .github/workflows/*
        values:
          name: ${{ parameters.name }}
          namespace: ${{ parameters.namespace }}
          description: ${{ parameters.description }}
          dockerfile: docker/Dockerfile
          buildContext: .
          gitopsSecretName: gitops-auth-secret
          image: ${{ parameters.imageRegistry }}/${{ parameters.imageOrg }}/${{ parameters.imageName }}
          tags: '["python", "pip", "flask", "sscs", "sbom", "acs", "nb-coe"]'
          repoURL: https://github.com/${{ parameters.repoOwner }}/${{ parameters.repoName }}-gitops
          owner: ${{ parameters.owner }}
          repoSlug: ${{ parameters.imageOrg }}/${{ parameters.imageName }}
          defaultBranch: ${{ parameters.branch }}
          azureProject: ${{ parameters.azureProject if parameters.ciType === 'azure' else '' }}
          azureOrg: ${{ parameters.azureOrg if parameters.ciType === 'azure' else '' }}

    # ── 11. Publish source repo to GitHub ──────────────────────────────────
    - id: publish-github-source
      name: Publish Source Repository to GitHub
      action: publish:github
      input:
        sourcePath: source
        description: ${{ parameters.description }}
        repoUrl: github.com?owner=${{ parameters.repoOwner }}&repo=${{ parameters.repoName }}
        defaultBranch: ${{ parameters.branch }}
        protectDefaultBranch: false
        repoVisibility: public

    # ── 12. Register source in catalog ─────────────────────────────────────
    - id: register-source
      name: Register Source in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github-source'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    # ── 13. Register GitOps in catalog ─────────────────────────────────────
    - id: register-gitops
      name: Register GitOps in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github-gitops'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Source Repository
        url: ${{ steps['publish-github-source'].output.remoteUrl }}
      - title: GitOps Repository
        url: ${{ steps['publish-github-gitops'].output.remoteUrl }}
      - title: Open Component in Catalog
        icon: catalog
        entityRef: ${{ steps['register-source'].output.entityRef }}
      - title: Open GitOps Resource in Catalog
        icon: catalog
        entityRef: ${{ steps['register-gitops'].output.entityRef }}
      - title: Open in Coder
        url: https://coder-coder.${{ steps['fetch-provision-data'].output.entity.metadata.labels['ocp-apps-domain'] }}/@me/${{ parameters.name }}
        icon: dashboard
      - title: ArgoCD Application
        url: https://argocd.${{ steps['fetch-provision-data'].output.entity.metadata.labels['ocp-apps-domain'] }}/applications/${{ parameters.name }}-app-of-apps
        icon: cloud
