apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.component_id }}
  description: ${{ values.description }}
  annotations:
    # ── GitHub ──
    github.com/project-slug: sansow/${{ values.component_id }}
    # ── ArgoCD ──
    argocd/app-name: ${{ values.component_id }}
    # ── Coder Workspace ──
    coder.com/workspace-template: ${{ values.coder_template }}
    coder.com/workspace-url: https://coder-coder.apps.cluster-cnhmj.dynamic.redhatworkshops.io/@me/${{ values.component_id }}
    # ── ACS (StackRox) Security ──
    redhat.com/acs-image-scan: enabled
    redhat.com/acs-deployment-check: enabled
    # ── Network Observability ──
    redhat.com/network-observability: enabled
    # ── TechDocs ──
    backstage.io/techdocs-ref: dir:.
    # ── RHACS ──
    acs/deployment-name: ${{ values.name }}
    acs.secured-by: "production"
  tags:
    - ${{ values.language }}
    - golden-path
    - ${{ values.system }}
  links:
    - title: Open in Coder
      url: https://coder-coder.apps.cluster-cnhmj.dynamic.redhatworkshops.io/@me/${{ values.component_id }}
      icon: dashboard
      type: ide
    - title: ArgoCD
      url: https://argocd.apps.cluster-cnhmj.dynamic.redhatworkshops.io/applications/${{ values.component_id }}
      icon: cloud
      type: deployment
    - title: ACS Security
      url: https://acs.apps.cluster-cnhmj.dynamic.redhatworkshops.io/main/vulnerability-management
      icon: security
      type: security
    - title: Grafana Dashboard
      url: https://grafana.apps.cluster-cnhmj.dynamic.redhatworkshops.io/d/${{ values.component_id }}
      icon: dashboard
      type: monitoring
spec:
  type: service
  lifecycle: production
  owner: ${{ values.owner }}
  system: ${{ values.system }}
  providesApis:
    - ${{ values.component_id }}-api
  {%- if values.include_kafka or values.include_db %}
  dependsOn:
    {%- if values.include_kafka %}
    - resource:nb-kafka-platform
    {%- endif %}
    {%- if values.include_db %}
    - resource:default/${{ values.component_id }}-db
    {%- endif %}
  {%- endif %}
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{ values.component_id }}-api
  description: API for ${{ values.component_id }}
spec:
  type: openapi
  lifecycle: production
  owner: ${{ values.owner }}
  system: ${{ values.system }}
  definition: |
    openapi: "3.0.0"
    info:
      title: ${{ values.component_id }}
      version: 0.1.0
    paths:
      /health:
        get:
          summary: Health check
          responses:
            '200':
              description: OK
