name: CI - Build, Scan, Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_REGISTRY: registry.nb.internal
  IMAGE_NAME: ${{ values.system }}/${{ values.component_id }}

jobs:
  build-and-scan:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Image
        run: |
          podman build -t ${IMAGE_REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA::8} .
          podman tag ${IMAGE_REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA::8} \
            ${IMAGE_REGISTRY}/${IMAGE_NAME}:latest

      - name: ACS Image Scan
        run: |
          roxctl image check \
            --endpoint ${ACS_ENDPOINT} \
            --image ${IMAGE_REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA::8}
          roxctl image scan \
            --endpoint ${ACS_ENDPOINT} \
            --image ${IMAGE_REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA::8} \
            --output json > acs-scan.json
        env:
          ACS_ENDPOINT: acs.nb.internal:443
          ROX_API_TOKEN: $${{ secrets.ACS_TOKEN }}

      - name: Generate SBOM
        run: |
          syft ${IMAGE_REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA::8} \
            -o spdx-json > sbom.spdx.json

      - name: Push Image
        if: github.ref == 'refs/heads/main'
        run: |
          podman push ${IMAGE_REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA::8}
          podman push ${IMAGE_REGISTRY}/${IMAGE_NAME}:latest

      - name: Update Helm Tag (GitOps trigger)
        if: github.ref == 'refs/heads/main'
        run: |
          sed -i "s/tag: .*/tag: ${GITHUB_SHA::8}/" chart/values.yaml
          git config user.name "github-actions"
          git config user.email "actions@nb.internal"
          git add chart/values.yaml
          git commit -m "ci: update image tag to ${GITHUB_SHA::8}"
          git push
